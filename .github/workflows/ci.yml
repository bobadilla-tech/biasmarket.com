name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - ".gitignore"
      - "*.md"
      - "**/*.md"
  pull_request:
    branches: [main]
    paths-ignore:
      - ".gitignore"
      - "*.md"
      - "**/*.md"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "10.11.0"
  # Dummy connection string — `prisma generate` validates the schema's env()
  # reference but never opens a connection, so a syntactically valid URL is enough.
  CI_DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci?schema=public"

jobs:
  detect-changes:
    name: Detect Changed Packages
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
      db: ${{ steps.filter.outputs.db }}
      i18n: ${{ steps.filter.outputs.i18n }}
      types: ${{ steps.filter.outputs.types }}
      ui: ${{ steps.filter.outputs.ui }}
      utils: ${{ steps.filter.outputs.utils }}
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            api:
              - 'apps/api/**'
              - 'packages/db/**'
              - 'packages/i18n/**'
              - 'packages/types/**'
              - 'packages/utils/**'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'turbo.json'
              - 'package.json'
              - '.github/workflows/ci.yml'
            web:
              - 'apps/web/**'
              - 'packages/i18n/**'
              - 'packages/types/**'
              - 'packages/ui/**'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'turbo.json'
              - 'package.json'
              - '.github/workflows/ci.yml'
            db:
              - 'packages/db/**'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'turbo.json'
              - 'package.json'
              - '.github/workflows/ci.yml'
            i18n:
              - 'packages/i18n/**'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'turbo.json'
              - 'package.json'
              - '.github/workflows/ci.yml'
            types:
              - 'packages/types/**'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'turbo.json'
              - 'package.json'
              - '.github/workflows/ci.yml'
            ui:
              - 'packages/ui/**'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'turbo.json'
              - 'package.json'
              - '.github/workflows/ci.yml'
            utils:
              - 'packages/utils/**'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'turbo.json'
              - 'package.json'
              - '.github/workflows/ci.yml'

  api:
    name: API
    needs: detect-changes
    if: needs.detect-changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: ${{ env.CI_DATABASE_URL }}
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache turbo
        uses: actions/cache@v6
        with:
          path: .turbo/cache
          key: turbo-api-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            turbo-api-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-

      - name: Lint
        run: pnpm turbo run lint --filter=api

      - name: Typecheck
        run: pnpm turbo run typecheck --filter=api

      - name: Build
        run: pnpm turbo run build --filter=api

      - name: Test
        run: pnpm turbo run test --filter=api

  web:
    name: Web
    needs: detect-changes
    if: needs.detect-changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache turbo
        uses: actions/cache@v6
        with:
          path: .turbo/cache
          key: turbo-web-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            turbo-web-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-

      - name: Lint
        run: pnpm turbo run lint --filter=web

      - name: Typecheck
        run: pnpm turbo run typecheck --filter=web

      - name: Build
        run: pnpm turbo run build --filter=web

  db:
    name: DB (Prisma)
    needs: detect-changes
    if: needs.detect-changes.outputs.db == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DATABASE_URL: ${{ env.CI_DATABASE_URL }}
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache turbo
        uses: actions/cache@v6
        with:
          path: .turbo/cache
          key: turbo-db-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            turbo-db-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-

      - name: Build (prisma generate)
        run: pnpm turbo run build --filter=@barristore/db

      - name: Typecheck
        run: pnpm turbo run typecheck --filter=@barristore/db

  i18n:
    name: i18n
    needs: detect-changes
    if: needs.detect-changes.outputs.i18n == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache turbo
        uses: actions/cache@v6
        with:
          path: .turbo/cache
          key: turbo-i18n-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            turbo-i18n-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-

      - name: Build
        run: pnpm turbo run build --filter=@barristore/i18n

      - name: Typecheck
        run: pnpm turbo run typecheck --filter=@barristore/i18n

  types:
    name: Types
    needs: detect-changes
    if: needs.detect-changes.outputs.types == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache turbo
        uses: actions/cache@v6
        with:
          path: .turbo/cache
          key: turbo-types-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            turbo-types-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-

      - name: Build
        run: pnpm turbo run build --filter=@barristore/types

      - name: Typecheck
        run: pnpm turbo run typecheck --filter=@barristore/types

  ui:
    name: UI
    needs: detect-changes
    if: needs.detect-changes.outputs.ui == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache turbo
        uses: actions/cache@v6
        with:
          path: .turbo/cache
          key: turbo-ui-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            turbo-ui-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-

      - name: Typecheck
        run: pnpm turbo run typecheck --filter=@barristore/ui

  utils:
    name: Utils
    needs: detect-changes
    if: needs.detect-changes.outputs.utils == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache turbo
        uses: actions/cache@v6
        with:
          path: .turbo/cache
          key: turbo-utils-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            turbo-utils-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-

      - name: Build
        run: pnpm turbo run build --filter=@barristore/utils

      - name: Typecheck
        run: pnpm turbo run typecheck --filter=@barristore/utils

  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - api
      - web
      - db
      - i18n
      - types
      - ui
      - utils
    if: always()
    steps:
      - name: Check all required jobs
        run: |
          if [[ "${{ needs.api.result }}" == "failure" ]]; then
            echo "API checks failed"
            exit 1
          fi
          if [[ "${{ needs.web.result }}" == "failure" ]]; then
            echo "Web checks failed"
            exit 1
          fi
          if [[ "${{ needs.db.result }}" == "failure" ]]; then
            echo "DB checks failed"
            exit 1
          fi
          if [[ "${{ needs.i18n.result }}" == "failure" ]]; then
            echo "i18n checks failed"
            exit 1
          fi
          if [[ "${{ needs.types.result }}" == "failure" ]]; then
            echo "Types checks failed"
            exit 1
          fi
          if [[ "${{ needs.ui.result }}" == "failure" ]]; then
            echo "UI checks failed"
            exit 1
          fi
          if [[ "${{ needs.utils.result }}" == "failure" ]]; then
            echo "Utils checks failed"
            exit 1
          fi
          echo "All required checks passed!"
